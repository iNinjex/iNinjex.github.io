<!DOCTYPE html>
<!-- Tells the browser this is an HTML5 document -->

<html lang="en">
<!-- Starts the HTML page and sets the language to English -->

<head>
<!-- The head section stores page title, settings, and CSS links -->

<meta charset="UTF-8">
<!-- Allows standard text characters -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Makes the page responsive on phones, tablets, and desktops -->

<title>Sign Up</title>
<!-- Title shown on the browser tab -->

<link rel="stylesheet" href="style.css">
<!-- Main CSS file for styling the page -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<!-- Font Awesome icon library -->
</head>

<body class="signup-page">
<!-- Everything visible on the page starts here -->
<!-- signup-page class allows page-specific styling -->

<!-- ===== SIDEBAR ===== -->
<!-- Dark overlay shown behind the sidebar when it opens -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar navigation menu -->
<aside class="sidebar" id="sidebar">

    <!-- Top section of sidebar with close button -->
    <div class="sidebar-top">
        <button class="close-sidebar" id="closeSidebar">
            <i class="fa-solid fa-xmark"></i>
            <!-- X icon closes the sidebar -->
        </button>
    </div>

    <!-- Sidebar navigation links -->
    <nav class="sidebar-links">

        <a href="search.html">
            <span>Search Page</span>
            <i class="fa-solid fa-magnifying-glass"></i>
        </a>

        <a href="index.html">
            <span>Home Page</span>
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="product.html">
            <span>Product Page</span>
            <i class="fa-solid fa-box-open"></i>
        </a>

        <a href="about.html">
            <span>About Page</span>
            <i class="fa-solid fa-circle-info"></i>
        </a>

        <a href="help.html">
            <span>Help</span>
            <i class="fa-solid fa-circle-question"></i>
        </a>

        <a href="contactus.html">
            <span>Contact Us</span>
            <i class="fa-solid fa-envelope"></i>
        </a>
        <button class="theme-toggle-button mobile-theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
    <span class="theme-toggle-text">Dark Mode</span>
</button>

    </nav>
</aside>

<!-- ===== MAIN SITE ===== -->
<!-- Wraps the main visible website content -->
<div class="site-wrapper">

<header class="top-header">
<!-- Top header section -->

    <div class="header-row">
    <!-- Row holding left and right header content -->

        <div class="left-header">
        <!-- Left side of header -->

            <button class="icon-button mobile-menu-button" id="openSidebar" aria-label="Open menu">
                <i class="fa-solid fa-bars"></i>
                <!-- Hamburger menu icon -->
            </button>

            <a href="index.html" class="brand-name">SEARS</a>
            <!-- Sears logo linking to the home page -->

            <nav class="desktop-nav">
            <!-- Desktop navigation links -->
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="product.html">Products</a>
                <a href="about.html">About</a>
                <a href="help.html">Help</a>
                <a href="contactus.html">Contact Us</a>
                
            </nav>
        </div>

        <div class="right-header">
        <!-- Right side of header -->
         <button class="icon-button theme-toggle-button desktop-theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                    </button>

            <a href="cart.html" class="icon-button cart-icon-wrapper" aria-label="Shopping cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <!-- Shopping cart icon -->

                <span id="cartCount" class="cart-count">0</span>
                <!-- Shows the number of items in the cart -->
            </a>

            <a href="signin.html" class="icon-button" aria-label="User account">
                <i class="fa-solid fa-user"></i>
                <!-- User account icon -->
            </a>
        </div>

    </div>

    <div class="search-bar">
    <!-- Search bar under the header -->

        <i class="fa-solid fa-magnifying-glass"></i>
        <!-- Search icon -->

        <input type="text" id="headerSearchInput" placeholder="Search">
        <!-- Search input field -->

        <div id="suggestions"></div>
        <!-- Search suggestions can appear here -->
    </div>

</header>

<!-- ===== SIGNUP FORM ===== -->
<main class="form-page">
<!-- Main sign up form section -->

    <h2>Sign Up</h2>
    <!-- Page heading -->

    <label>Choose username:</label>
    <!-- Label for the username input -->

    <input type="text" placeholder="Enter username">
    <!-- Input field where the user types a username -->

    <label>Choose password:</label>
    <!-- Label for the password input -->

    <input type="password" placeholder="Enter password">
    <!-- Input field where the user types a password -->

    <button type="button" class="cart-btn" id="signupButton">
        Sign Up
    </button>
    <!-- Button used to submit the sign up action -->

</main>

<!-- FOOTER -->
<footer class="bottom-footer">
<!-- Footer section at the bottom of the page -->
    <p>HELP | TRACK ORDER | RETURNS | PRIVACY TERMS</p>
    <p>CAREERS | STORE LOCATOR</p>
</footer>

</div>

<!-- Loading screen shown during sign up or page transitions -->
<div class="page-loader" id="pageLoader">

    <p id="loaderText">Loading...</p>
    <!-- Loading message -->

    <div class="progress-bar-box">
        <!-- Outer progress bar container -->

        <div class="progress-bar-fill" id="progressBarFill"></div>
        <!-- Inner bar that fills as loading progresses -->
    </div>

</div>

<script src="script.js"></script>
<!-- Links your JavaScript file -->

</body>
</html>
