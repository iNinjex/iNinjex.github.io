<!DOCTYPE html>
<!-- Tells the browser this is an HTML5 document -->

<html lang="en">
<!-- Starts the HTML page and sets the language to English -->

<head>
    <!-- The head section stores page title, settings, and CSS links -->

    <meta charset="UTF-8">
    <!-- Allows standard text characters -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive on phones, tablets, and desktops -->

    <title>Tools</title>
    <!-- Title shown on the browser tab -->

    <link rel="stylesheet" href="style.css">
    <!-- Main CSS file for overall site styling -->

    <link rel="stylesheet" href="appliances.css">
    <!-- Extra CSS file for this category-style page layout -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Font Awesome icon library -->
</head>

<body>
<!-- Everything visible on the page starts here -->

<!-- Dark overlay shown behind the sidebar when it opens -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar navigation menu -->
<aside class="sidebar" id="sidebar">

    <!-- Top section of the sidebar with the close button -->
    <div class="sidebar-top">
        <button class="close-sidebar" id="closeSidebar">
            <i class="fa-solid fa-xmark"></i>
            <!-- X icon closes the sidebar -->
        </button>
    </div>

    <!-- Sidebar navigation links -->
    <nav class="sidebar-links">

        <a href="search.html">
            <span>Search Page</span>
            <i class="fa-solid fa-magnifying-glass"></i>
        </a>

        <a href="index.html">
            <span>Home Page</span>
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="product.html">
            <span>Product Page</span>
            <i class="fa-solid fa-box-open"></i>
        </a>

        <a href="about.html">
            <span>About Page</span>
            <i class="fa-solid fa-circle-info"></i>
        </a>

        <a href="help.html">
            <span>Help</span>
            <i class="fa-solid fa-circle-question"></i>
        </a>

        <a href="contactus.html">
            <span>Contact Us</span>
            <i class="fa-solid fa-envelope"></i>
        </a>
        <button class="theme-toggle-button mobile-theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
    <span class="theme-toggle-text">Dark Mode</span>
</button>

    </nav>
</aside>

<!-- Wraps the main visible website content -->
<div class="site-wrapper">

    <!-- Top header section -->
    <header class="top-header">

        <!-- Row holding the left and right parts of the header -->
        <div class="header-row">

            <!-- Left side of the header -->
            <div class="left-header">

                <!-- Mobile menu button used to open the sidebar -->
                <button class="icon-button mobile-menu-button" id="openSidebar" aria-label="Open menu">
                    <i class="fa-solid fa-bars"></i>
                    <!-- Hamburger menu icon -->
                </button>

                <!-- Sears logo that links back to the homepage -->
                <a href="index.html" class="brand-name">SEARS</a>

                <!-- Desktop navigation menu -->
                <nav class="desktop-nav">
                    <a href="index.html">Home</a>
                    <a href="search.html">Search</a>
                    <a href="product.html">Products</a>
                    <a href="about.html">About</a>
                    <a href="help.html">Help</a>
                    <a href="contactus.html">Contact Us</a>
                    
                </nav>
            </div>

            <!-- Right side of the header -->
            <div class="right-header">
                <button class="icon-button theme-toggle-button desktop-theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                    </button>

                <!-- Shopping cart icon linking to the cart page -->
                <a href="cart.html" class="icon-button cart-icon-wrapper" aria-label="Shopping cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <!-- Shopping cart icon -->

                    <span id="cartCount" class="cart-count">0</span>
                    <!-- Shows the number of items currently in the cart -->
                </a>

                <!-- User account icon linking to the sign-in page -->
                <a href="signin.html" class="icon-button" aria-label="User account">
                    <i class="fa-solid fa-user"></i>
                    <!-- User account icon -->
                </a>
            </div>

        </div>

        <!-- Search bar below the main header row -->
        <div class="search-bar">

            <i class="fa-solid fa-magnifying-glass"></i>
            <!-- Search icon -->

            <input type="text" id="headerSearchInput" placeholder="Search products">
            <!-- Search input field -->

            <div id="suggestions"></div>
            <!-- Search suggestions can appear here -->
        </div>

    </header>

    <!-- Main page content -->
    <main class="main-content">

        <!-- Tools page section -->
        <section class="appliances-page">

            <h2 class="page-title">Tools</h2>
            <!-- Main page heading -->

            <div class="promo-banner">
                <img src="images/tools1.jpg" alt="30% off tools">
            </div>
            <!-- Promotional banner image for the tools page -->

            <div class="appliance-grid">
                <!-- Grid that holds the tool category cards -->

                <div class="appliance-card">
                    <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033" alt="Lawn Mowers">
                    <h3>Lawn Mowers</h3>
                </div>
                <!-- First tool category card -->

                <div class="appliance-card">
                    <img src="images/garagedooropeners.jpg" alt="Garage Door Opener">
                    <h3>Garage Door Openers</h3>
                </div>
                <!-- Second tool category card -->

                <div class="appliance-card">
                    <img src="https://images.unsplash.com/photo-1586864387967-d02ef85d93e8" alt="Wrenches">
                    <h3>Wrenches</h3>
                </div>
                <!-- Third tool category card -->

            </div>

        </section>

    </main>

    <!-- Footer section at the bottom of the page -->
    <footer class="bottom-footer">
        <p>HELP | TRACK ORDER | RETURNS | PRIVACY TERMS</p>
        <p>CAREERS | STORE LOCATOR</p>
    </footer>

</div>

<!-- Loading screen shown during page transitions -->
<div class="page-loader" id="pageLoader">

    <div class="loader-spinner"></div>
    <!-- Spinner animation -->

    <p>Loading...</p>
    <!-- Loading text -->
</div>

<!-- Connects the JavaScript file -->
<script src="script.js"></script>

</body>
</html>
